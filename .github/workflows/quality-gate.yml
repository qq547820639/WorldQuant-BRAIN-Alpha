name: Quality Gate

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and dev tooling
        run: python -m pip install -e ".[test,dev]"

      - name: Run essential quality gates
        id: essential
        run: python scripts/quality_gate.py --json --skip-tests

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Run optional quality gates (informational)
        continue-on-error: true
        run: python scripts/quality_gate.py --optional-tooling --ruff --mypy --dependency-audit --skip-tests 2>&1 || true
